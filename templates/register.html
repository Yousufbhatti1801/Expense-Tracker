{% extends 'base.html' %}

{% block title %}Register — Spendly{% endblock %}

{% block content %}
<div class="container">
    <div class="card">
        <h1 class="card-title">Create an account</h1>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label" for="name">Name</label>
                <input class="form-input" type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input class="form-input" type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm password</label>
                <input class="form-input" type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button class="btn btn-primary btn-block" type="submit">Register</button>
        </form>
        <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
